<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المراقبة والتحقق - النظام الوطني للإحصاء الفلاحي 2025</title>
    
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/main.css">
</head>
<body dir="rtl">
   <div id="header-placeholder"></div>
  ...
  <script>
    fetch('../componts/backend-header.html')
      .then(r => r.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);
  </script>
   

    <!-- لوحة الإشعارات المنبثقة -->
    <div class="notifications-panel" id="notificationsPanel" style="display: none;">
        <div class="notifications-header">
            <h3>الإشعارات</h3>
        </div>
        <div id="notificationsList"></div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div class="main-container">
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <h2>قائمة المراقب</h2>
            
            <div class="menu-item active" onclick="showPage('dashboard')">
                <i class="fas fa-home"></i>
                لوحة التحكم
            </div>
            <div class="menu-item" onclick="showPage('pending')">
                <i class="fas fa-clock"></i>
                الملفات قيد الانتظار
                <span class="badge" style="position: static; margin-right: auto; background: var(--warning); color: white;" id="pendingCount">0</span>
            </div>
            <div class="menu-item" onclick="showPage('approved')">
                <i class="fas fa-check-circle"></i>
                الملفات المقبولة
                <span class="badge" style="position: static; margin-right: auto; background: var(--success); color: white;" id="approvedCount">0</span>
            </div>
            <div class="menu-item" onclick="showPage('rejected')">
                <i class="fas fa-times-circle"></i>
                الملفات المرفوضة
                <span class="badge" style="position: static; margin-right: auto; background: var(--danger); color: white;" id="rejectedCount">0</span>
            </div>
            
            <div class="menu-divider"></div>
            
            <div class="menu-item" onclick="showPage('history')">
                <i class="fas fa-history"></i>
                سجل المراجعات
            </div>
            <div class="menu-item" onclick="showPage('stats')">
                <i class="fas fa-chart-bar"></i>
                إحصائيات التحقق
            </div>
           
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="content" id="mainContent">
            <!-- سيتم تحميل المحتوى ديناميكياً -->
        </div>
    </div>

    <!-- نافذة المراجعة (قبول/رفض) -->
    <div class="review-modal" id="reviewModal">
        <div class="review-content">
            <div class="review-header">
                <h3 id="reviewTitle">مراجعة الملف</h3>
                <p id="reviewFarmerName" style="color: var(--primary);"></p>
            </div>
            
            <div class="review-form-group">
                <label>ملاحظات المراجعة</label>
                <textarea class="review-form-control" id="reviewNotes" placeholder="أدخل ملاحظاتك حول هذا الملف..."></textarea>
            </div>
            
            <div class="review-form-group">
                <label>سبب الرفض (في حالة الرفض)</label>
                <select class="review-form-control" id="rejectReason">
                    <option value="">اختر سبب الرفض</option>
                    <option value="بيانات ناقصة">بيانات ناقصة</option>
                    <option value="بيانات غير صحيحة">بيانات غير صحيحة</option>
                    <option value="ملف مكرر">ملف مكرر</option>
                    <option value="اشتباه في تزوير">اشتباه في تزوير</option>
                    <option value="سبب آخر">سبب آخر</option>
                </select>
            </div>
            
            <div class="action-buttons" style="justify-content: center;">
                <button class="btn btn-approve" onclick="confirmApprove()">
                    <i class="fas fa-check-circle"></i> قبول الملف
                </button>
                <button class="btn btn-reject" onclick="confirmReject()">
                    <i class="fas fa-times-circle"></i> رفض الملف
                </button>
                <button class="btn btn-edit" onclick="closeReviewModal()">
                    <i class="fas fa-times"></i> إلغاء
                </button>
            </div>
        </div>
    </div>

    <!-- نافذة تفاصيل الملف -->
    <div class="details-modal" id="detailsModal">
        <div class="details-content">
            <div class="details-header">
                <div style="font-size: 24px; font-weight: 800;" id="detailsName"></div>
                <div style="opacity: 0.9;" id="detailsId"></div>
            </div>
            
            <div id="detailsContent"></div>
            
            <div class="action-buttons" style="justify-content: center; margin-top: 20px;">
                <button class="btn btn-view" onclick="closeDetailsModal()">
                    <i class="fas fa-times"></i> إغلاق
                </button>
            </div>
        </div>
    </div>

    <script src="../js/control.js"> </script>
</body>
</html>
